# GRPO (Group Relative Policy Optimization) RL training configuration
# LLaMA-Factory compatible — for Qwen3-8B after SFT warm-up
#
# Usage: llamafactory-cli train configs/grpo.yaml

### Model
model_name_or_path: models/qwen3-8b-lora-sft
template: qwen3

### Training
stage: grpo
finetuning_type: lora
lora_rank: 8
lora_target: all

### Data
dataset: su7_carvoice_grpo
max_samples: 10000
cutoff_len: 6144
preprocessing_num_workers: 16

### Output
output_dir: models/qwen3-8b-lora-grpo
logging_steps: 5
save_steps: 100

### Hyperparams
learning_rate: 1.0e-6
num_train_epochs: 3
max_grad_norm: 1.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 8

### GRPO-specific
num_generations: 4
max_new_tokens: 1536
temperature: 0.7
top_p: 0.9
reward_type: function
beta: 0.01

### System
fp16: true
